name: Graamashaale
description: An offline-first educational app for rural high school students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.6.0
  # firebase_firestore: ^5.4.4
  cloud_firestore: ^5.4.4

  # Connectivity
  # connectivity_plus: ^6.0.3

  # PDF viewer
  flutter_pdfview: ^1.3.2 
  path_provider: ^2.1.2
  
  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # Lightweight key-value store
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Connectivity
  connectivity_plus: ^6.0.3

  flutter_native_splash: ^2.4.1
  
  # Navigation
  go_router: ^13.2.0
  
  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/content/class8/core/
    - assets/content/class8/languages/
    - assets/content/class9/core/
    - assets/content/class9/languages/
    - assets/content/class10/core/
    - assets/content/class10/languages/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png" 
  web:
    generate: false  

flutter_native_splash:
  color: "#2E7D32"
  image: assets/images/app_icon.png
  color_dark: "#1B5E20"
  image_dark: assets/images/app.png
  android_12:
    color: "#2E7D32"
    image: assets/images/app.png
  fullscreen: true
